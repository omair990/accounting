# Render Blueprint — Python runtime (no Docker).
#
# Provisions:
#   - ocit-db:        Postgres 16 (free tier)
#   - ocit-accounting: Python 3.11 web service running Odoo from source
#
# Build:  deploy/render-build.sh   (pip install + clone OCA repos)
# Start:  deploy/render-start.sh   (parses DATABASE_URL, execs python -m odoo)
#
# How to deploy:
#   1. https://dashboard.render.com/select-repo?type=blueprint
#   2. Pick omair990/accounting → Apply
#   3. Wait ~6–10 min for first build
#
# Notes:
#   - Postgres free tier expires after 90 days. Upgrade to basic-256mb later.
#   - Starter plan = 512MB RAM. Tight for Odoo; switch to standard ($25/mo,
#     2GB) for production by editing `plan:` below or in the dashboard.
#   - PDF reports require wkhtmltopdf, which is NOT available on Render's
#     Python runtime. If you need PDFs, switch back to the Docker runtime
#     (we still have Dockerfile in the repo).

databases:
  - name: ocit-db
    databaseName: ocit
    user: ocit
    plan: free
    postgresMajorVersion: "16"
    region: frankfurt          # MUST match the web service region below,
                               # otherwise the internal dpg-*-a hostname
                               # won't resolve from the web container.

services:
  - type: web
    name: ocit-accounting
    runtime: python
    plan: starter
    region: frankfurt          # oregon | ohio | singapore | frankfurt
    branch: main
    healthCheckPath: /web/login
    autoDeploy: true
    buildCommand: ./deploy/render-build.sh
    startCommand: ./deploy/render-start.sh
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.10"
      - key: DATABASE_URL
        fromDatabase:
          name: ocit-db
          property: connectionString
      - key: ADMIN_PASSWORD
        generateValue: true
